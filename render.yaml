services:
  - type: web
    name: Shef
    env: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn lc:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: TAVILY_API_KEY
        sync: false
      - key: NVIDIA_API_KEY
        sync: false
      - key: PARAKEET_API_KEY
        sync: false
      - key: META_API_KEY
        sync: false
      - key: ADMIN_DASHBOARD_TOKEN
        sync: false
      - key: SHEF_USAGE_DATABASE_URL
        sync: false
