<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Shef Chat</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <link rel="icon" href="./assets/icon-transparent.png" />
    <link rel="stylesheet" href="./styles.css?v=4641903" />
  </head>
  <body>
    <div class="app-shell">
      <aside class="sidebar" id="sidebar" aria-label="Chat navigation">
        <div class="brand">
          <div class="brand-mark" aria-hidden="true">
            <img class="chef-logo-img" src="./assets/icon-transparent.png" alt="" />
          </div>
          <span>Shef</span>
          <button class="sidebar-close-button" id="sidebarCloseButton" type="button" aria-label="Close chat history">
            <span aria-hidden="true">&times;</span>
          </button>
        </div>

        <button class="new-chat-button" type="button" id="newChatButton">
          <span class="new-chat-icon" aria-hidden="true">+</span>
          New Chat
        </button>

        <section class="recent-section" aria-labelledby="recentChatsTitle">
          <h2 id="recentChatsTitle">Recent Chats</h2>
          <div class="chat-list" id="chatList"></div>
        </section>

        <section class="tip-card" aria-label="Shef tip">
          <div class="tip-illustration" aria-hidden="true">S</div>
          <div>
            <h2>Shef Tip</h2>
            <p>Add local ingredients you have on hand, and Shef will make it delicious.</p>
          </div>
        </section>
      </aside>

      <div class="sidebar-backdrop" id="sidebarBackdrop" hidden></div>

      <main class="chat-panel">
        <header class="chat-header">
          <div class="chat-header-main">
            <button
              class="menu-button"
              id="menuButton"
              type="button"
              aria-label="Open chat history"
              aria-controls="sidebar"
              aria-expanded="false"
            >
              <span aria-hidden="true"></span>
              <span aria-hidden="true"></span>
              <span aria-hidden="true"></span>
            </button>
            <div>
              <h1>Shef</h1>
              <p>Your personal chef assistant from the Philippines</p>
            </div>
          </div>
        </header>

        <section class="message-list" id="messageList" aria-live="polite" aria-label="Conversation"></section>

        <form class="composer" id="composerForm">
          <input
            class="visually-hidden"
            id="imageInput"
            type="file"
            accept="image/*"
          />
          <div class="attachment-tray" id="attachmentTray" aria-live="polite"></div>
          <div class="recording-bar" id="recordingBar" hidden>
            <span class="record-dot" aria-hidden="true"></span>
            <span id="recordingStatus">Recording...</span>
            <time id="recordingTimer">00:00</time>
            <button class="stop-recording" id="stopRecordingButton" type="button" aria-label="Stop recording">
              <svg viewBox="0 0 24 24" aria-hidden="true" focusable="false">
                <rect x="7" y="7" width="10" height="10" rx="1"></rect>
              </svg>
            </button>
          </div>
          <div class="composer-row">
            <button class="icon-button add-button" id="addButton" type="button" aria-label="Attach image">
              <span aria-hidden="true">+</span>
            </button>
            <button class="mic-button" id="micButton" type="button" aria-label="Record audio">
              <svg viewBox="0 0 24 24" aria-hidden="true" focusable="false">
                <path d="M12 14a3.5 3.5 0 0 0 3.5-3.5V6a3.5 3.5 0 0 0-7 0v4.5A3.5 3.5 0 0 0 12 14Z" />
                <path d="M18 10.5a6 6 0 0 1-12 0M12 16.5V21M9 21h6" />
              </svg>
            </button>
            <input
              id="messageInput"
              name="message"
              type="text"
              autocomplete="off"
              placeholder="Ask Shef about ingredients, recipes, or substitutions"
            />
            <button class="icon-button send-button" id="sendButton" type="submit" aria-label="Send message">
              <svg viewBox="0 0 24 24" aria-hidden="true" focusable="false">
                <path d="M21 4 10 15" />
                <path d="m21 4-7 17-4-6-6-4 17-7Z" />
              </svg>
            </button>
          </div>
          <p class="composer-error" id="composerError" role="alert"></p>
        </form>
      </main>
    </div>

    <div class="toast-container" id="toastContainer" aria-live="polite"></div>

    <script src="./app.js?v=4641903"></script>
  </body>
</html>
